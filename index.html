<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MySocial</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
}

textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: white;
    cursor: pointer;
}

.post {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>MySocial 🌍</h1>

<div class="card">
<textarea id="text" placeholder="Напиши пост..."></textarea>
<button onclick="sendPost()">Опубликовать</button>
</div>

<div id="feed"></div>
</div>

<script>
const SERVER = "http://10.0.1.14:3000"; // ТВОЙ IP

async function loadPosts() {
    let res = await fetch(SERVER + "/posts");
    let posts = await res.json();

    feed.innerHTML = "";

    posts.reverse().forEach(p => {
        let div = document.createElement("div");
        div.className = "post";
        div.innerText = p.text;
        feed.appendChild(div);
    });
}

async function sendPost() {
    let text = document.getElementById("text").value;
    if (!text) return;

    await fetch(SERVER + "/posts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
    });

    document.getElementById("text").value = "";
    loadPosts();
}

loadPosts();
</script>

</body>
</html>
